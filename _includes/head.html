
<!-- Site build date: {{ "now" | date: "%FT%T%z" }} -->
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="author" content="{{ site.author }}">

  <!-- Google Fonts: Fira Code -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">

  {% seo %}

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" type="text/css" href="/css/override.css">

  {% feed_meta %}

  {% if jekyll.environment == 'production' and site.google_analytics -%}
  {% include google-analytics.html %}
  {%- endif %}

  <!-- highlight.js (custom dark styles in override.css) -->
  <script src="/js/highlightjs/highlight.min.js"></script>
  <script src="/js/highlightjs/languages/plaintext.min.js"></script>
  <script src="/js/highlightjs/languages/powershell.min.js"></script>
  <script src="/js/highlightjs/languages/tsql.min.js"></script>
  <script>hljs.highlightAll();</script>
</head>
